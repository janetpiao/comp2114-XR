<!DOCTYPE html>
<html>
<head>
    <title>WebXR: Scene Mesh Physics</title>
    <script src="https://unpkg.com/earcut@2.2.4/dist/earcut.min.js"></script>
    <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>    
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);

            // 1. Physics Engine Initialization
            const havokInstance = await HavokPhysics();
            const hk = new BABYLON.HavokPlugin(true, havokInstance);
            scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), hk);

            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.7;

            // 2. WebXR setup with Mesh Detection
            const xr = await scene.createDefaultXRExperienceAsync({
                uiOptions: {
                    sessionMode: "immersive-ar",
                    referenceSpaceType: "local-floor"
                },
                // We request 'mesh-detection' specifically for the room scan
                optionalFeatures: ["mesh-detection"]
            });

            // 3. Cube and Velocity Variables
            let cube;
            let cubeAggregate;
            let roomDetected = false;
            let lastPosition = new BABYLON.Vector3();
            let currentVelocity = new BABYLON.Vector3();
            let throwObserver;

            const dragBehavior = new BABYLON.SixDofDragBehavior();
            dragBehavior.dragDeltaRatio = 1.0;

            xr.baseExperience.sessionManager.onXRSessionInit.add(() => {
                cube = BABYLON.MeshBuilder.CreateBox("rubberCube", { size: 0.15 }, scene);
                const cubeMat = new BABYLON.StandardMaterial("cubeMat", scene);
                cubeMat.diffuseColor = new BABYLON.Color3(1, 0, 0);
                cube.material = cubeMat;
                cube.position = new BABYLON.Vector3(0, 1.5, 0.5);

                cubeAggregate = new BABYLON.PhysicsAggregate(cube, BABYLON.PhysicsShapeType.BOX, { mass: 1 }, scene);
                cubeAggregate.body.setMotionType(BABYLON.PhysicsMotionType.KINEMATIC);
                cube.addBehavior(dragBehavior);
            });

            // 4. Realistic Throw Logic
            dragBehavior.onDragStartObservable.add(() => {
                cubeAggregate.body.setMotionType(BABYLON.PhysicsMotionType.KINEMATIC);
                
                // Track hand movement frame-by-frame
                lastPosition.copyFrom(cube.position);
                throwObserver = scene.onBeforeRenderObservable.add(() => {
                    const deltaTime = engine.getDeltaTime() / 1000;
                    if (deltaTime > 0) {
                        cube.position.subtractToRef(lastPosition, currentVelocity);
                        currentVelocity.scaleInPlace(1 / deltaTime);
                        lastPosition.copyFrom(cube.position);
                    }
                });
            });

            dragBehavior.onDragEndObservable.add(() => {
                scene.onBeforeRenderObservable.remove(throwObserver);
                cubeAggregate.body.setTargetTransform(cube.position, cube.rotationQuaternion);
                
                if (roomDetected) {
                    cubeAggregate.body.setMotionType(BABYLON.PhysicsMotionType.DYNAMIC);
                    // Inject the calculated velocity into the physics body
                    cubeAggregate.body.setLinearVelocity(currentVelocity.scale(1.1)); 
                    // Add a slight random spin for realism
                    cubeAggregate.body.setAngularVelocity(new BABYLON.Vector3(Math.random()*2, Math.random()*2, Math.random()*2));
                }
            });

            // 5. Global Room Mesh Detector (Simpler than Planes)
            const fm = xr.baseExperience.featuresManager;
            const xrMeshDetector = fm.enableFeature(BABYLON.WebXRMeshDetector.Name, "latest");

            xrMeshDetector.onMeshAddedObservable.add((mesh) => {
                // This mesh represents the walls, floor, and furniture scanned by the OS
                mesh.isVisible = false; // Keep it invisible so we see the real room
                
                new BABYLON.PhysicsAggregate(mesh, BABYLON.PhysicsShapeType.MESH, { 
                    mass: 0, 
                    restitution: 0.3, // Slightly less bouncy for realism
                    friction: 0.5 
                }, scene);
                
                roomDetected = true;
            });

            return scene;
        };

        createScene().then((sceneToRender) => {
            engine.runRenderLoop(() => sceneToRender.render());
        });
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
